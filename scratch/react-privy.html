<!DOCTYPE html>
<html>
<head>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@privy-io/react-auth": "https://esm.sh/@privy-io/react-auth@1.61.1?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
  </script>
</head>
<body>
  <div id="privy-root"></div>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { PrivyProvider, usePrivy } from '@privy-io/react-auth';

    const LoginButton = () => {
      const { login, authenticated } = usePrivy();
      return React.createElement('button', {
        onClick: login,
        style: { padding: '10px 20px', fontSize: '16px' }
      }, authenticated ? 'Logged In' : 'Log In with Privy');
    };

    const App = () => {
      return React.createElement(PrivyProvider, {
        appId: 'cm4winhli04jg1tvq07cb8942',
        config: {
          loginMethods: ['email', 'wallet'],
          appearance: { theme: 'dark' }
        }
      }, React.createElement(LoginButton));
    };

    const root = createRoot(document.getElementById('privy-root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
